<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>坦克大战 · TANK BATTLE</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="arcade">
    <header class="title-bar">
      <h1 class="logo">坦 克 大 战</h1>
      <p class="subtitle">BATTLE CITY</p>
    </header>

    <div class="game-area">
      <canvas id="game" width="520" height="520"></canvas>

      <aside class="hud">
        <div class="hud-block">
          <span class="hud-label">关卡 STAGE</span>
          <span id="stage" class="hud-value">1</span>
        </div>
        <div class="hud-block">
          <span class="hud-label">得分 SCORE</span>
          <span id="score" class="hud-value">0</span>
        </div>
        <div class="hud-block">
          <span class="hud-label">生命 LIVES</span>
          <span id="lives" class="hud-value">3</span>
        </div>
        <div class="hud-block">
          <span class="hud-label">敌军 ENEMY</span>
          <div id="enemy-icons" class="enemy-icons"></div>
        </div>
        <div class="hud-help">
          <p>方向键 / WASD 移动</p>
          <p>空格 / J 开火</p>
          <p>P 暂停 · Enter 开始</p>
        </div>
      </aside>
    </div>

    <div id="overlay" class="overlay">
      <div class="overlay-card">
        <h2 id="overlay-title">坦 克 大 战</h2>
        <p id="overlay-text">保卫基地，消灭所有敌军坦克！</p>
        <button id="start-btn" class="btn">开始游戏 ENTER</button>
      </div>
    </div>

    <footer class="footer">© CLASSIC ARCADE · 本地 GIT 管理</footer>
  </div>

  <script src="game.js"></script>
</body>
</html>
